[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false

; Interval for volume increase/decrease (in percent points)
; Default: 5
interval = 5

format-volume = <ramp-volume> <label-volume>
format-volume-background = ${colors.module-background}
format-volume-foreground = ${colors.orange}
format-volume-padding = 1

label-muted =  Mute
format-muted-background = ${colors.module-background}
format-muted-foreground = ${colors.red}
format-muted-padding = 1

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-3 = 

click-right = alacritty -e sh -c 'pulsemixer'
click-middle = notify-send "pulsetest"
