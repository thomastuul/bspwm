[module/powermenu]
type = custom/text

click-left = rofi -no-config -no-lazy-grab -show powermenu -modi powermenu:./.local/share/rofi/rofi-power-menu.sh -theme ~/.config/bspwm/rofi/powermenu.rasi

content = ""
content-background = ${colors.module-background}
content-foreground = ${colors.red}
content-padding = 1

